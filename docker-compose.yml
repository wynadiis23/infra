services:
  postgres:
    image: postgres:18.1
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - infra-network
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  garage:
    image: dxflrs/garage:v2.2.0
    container_name: garage
    restart: unless-stopped
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
      - ./garage.toml:/etc/garage.toml:ro
    networks:
      - infra-network
    healthcheck:
      test: ["CMD", "garage", "status"]
      interval: 15s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      STAGING_DOMAIN: ${STAGING_DOMAIN}
      PRODUCTION_DOMAIN: ${PRODUCTION_DOMAIN}
      STORAGE_DOMAIN: ${STORAGE_DOMAIN}
    networks:
      - infra-network
    depends_on:
      - garage

  alloy:
    image: grafana/alloy:v1.1.0
    container_name: alloy
    restart: unless-stopped
    pid: host
    environment:
      - GRAFANA_CLOUD_URL=${GRAFANA_CLOUD_URL}
      - GRAFANA_CLOUD_USER=${GRAFANA_CLOUD_USER}
      - GRAFANA_CLOUD_TOKEN=${GRAFANA_CLOUD_TOKEN}
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      # Docker socket tetap di-mount jika ke depan Anda ingin memantau metrik internal container (cadvisor)
      - /var/run/docker.sock:/var/run/docker.sock:ro 
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    deploy:
      resources:
        limits:
          # Limit diturunkan ke 60M karena Alloy tidak lagi melakukan processing/parsing log yang berat
          memory: 60M 
    networks:
      - infra-network

volumes:
  postgres_data:
    external: true
  garage_meta:
    external: true
  garage_data:
    external: true
  caddy_data:
    external: true
  caddy_config:
    external: true

networks:
  infra-network:
    name: infra-network